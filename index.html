<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ragasutra – Hindol Deb</title>

<style>
body {
    margin: 0;
    font-family: "Garamond", serif;
    background: linear-gradient(#0b0b0b, #1a1200);
    color: #f5e6c8;
}

header {
    text-align: center;
    padding: 50px;
    border-bottom: 1px solid gold;
}

h1 {
    font-size: 52px;
    letter-spacing: 4px;
}

.section {
    padding: 50px;
    text-align: center;
}

.gallery img {
    width: 260px;
    height: 340px;
    object-fit: cover;
    margin: 15px;
    border: 2px solid gold;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

.videos iframe {
    width: 420px;
    height: 235px;
    margin: 20px;
    border: 2px solid gold;
    border-radius: 10px;
}

footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid gold;
}
</style>
</head>

<body>

<header>
    <h1>RAGASUTRA</h1>
    <p>North Indian Classical Sitar Solo by Hindol Deb</p>
</header>

<div class="section">
    <h2>Hindol Deb</h2>
    <div class="gallery" id="imageGallery"></div>
</div>

<div class="section">
    <h2>Performances</h2>
    <div class="videos" id="videoGallery"></div>
</div>

<footer>
    <p>Indian Classical Music • Raga • Time • Emotion</p>
</footer>

<script>
const images = [
"https://www.hindoldeb.com/sitepad-data/uploads/2022/11/51305297296_c5611fc61a_5k.jpg",
"https://cdn.alivenetwork.com/images/extrabandpics/20220220122002.jpg",
"https://static.toiimg.com/thumb/msid-117384371/photo.jpg",
"https://img.apmcdn.org/22970194c5013182631426a474b1a5908d59718a/widescreen.jpg"
];

const videos = [
"https://www.youtube.com/embed/2Vv-BfVoq4g",
"https://www.youtube.com/embed/kJQP7kiw5Fk",
"https://www.youtube.com/embed/3JZ4pnNtyxQ",
"https://www.youtube.com/embed/LsoLEjrDogU"
];

const imgContainer = document.getElementById("imageGallery");
images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    imgContainer.appendChild(img);
});

const videoContainer = document.getElementById("videoGallery");
videos.forEach(link => {
    const iframe = document.createElement("iframe");
    iframe.src = link;
    iframe.allowFullscreen = true;
    videoContainer.appendChild(iframe);
});
</script>

</body>
</html>
